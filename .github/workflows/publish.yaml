on:
  release:
    types:
      - published

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Fetch code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests
        run: pytest

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: pypi
      url: https://pypi.org/p/container-sucks
    permissions:
      id-token: write
    steps:
      - name: Fetch code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build package
        run: |
          pip install build
          python3 -m build

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
